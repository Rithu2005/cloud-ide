<!DOCTYPE html>
<html>
<head>
    <title>Cloud IDE</title>

    <!-- Monaco Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #020617;
            color: white;
            font-family: sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            border-bottom: 1px solid #111;
        }

        #container {
            display: flex;
            height: 92vh;
        }

        /* SIDEBAR */
        #sidebar {
            width: 220px;
            padding: 10px;
            border-right: 1px solid #111;
        }

        #fileList {
            margin-top: 10px;
        }

        .file-item {
            padding: 6px 8px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
        }

        .file-item:hover {
            background: #111827;
        }

        .delete-btn {
            color: red;
            cursor: pointer;
        }

        /* TOP TABS */
        #topTabs {
            display: flex;
            border-bottom: 1px solid #111;
            height: 40px;
            align-items: center;
            overflow-x: auto;
        }

        .tab {
            padding: 8px 16px;
            cursor: pointer;
            border-right: 1px solid #111;
            color: #aaa;
        }

        .tab.active {
            background: #0f172a;
            color: #22c55e;
        }

        .tab:hover {
            background: #111827;
        }

        /* EDITOR */
        #editor {
            flex: 1;
        }

        /* RIGHT PANEL */
        #right {
            width: 300px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #111;
        }

        textarea {
            flex: 1;
            background: black;
            color: #22c55e;
            border: none;
            padding: 10px;
            resize: none;
        }

        .btn {
            background: #22c55e;
            border: none;
            padding: 6px 12px;
            margin-left: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        select {
            padding: 6px;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<header>
    🚀 Cloud Code Execution Platform

    <div>
        <select id="lang" onchange="changeLang()">
            <option value="java">Java</option>
            <option value="python">Python</option>
            <option value="cpp">C++</option>
            <option value="c">C</option>
            <option value="js">JavaScript</option>
        </select>

        <button class="btn" onclick="runCode()">Run</button>
        <button class="btn" onclick="downloadCode()">Download</button>
        <button class="btn" onclick="shareCode()">Share</button>
        <button class="btn" onclick="newFile()">New File</button>
    </div>
</header>

<div id="container">

    <!-- SIDEBAR -->
    <div id="sidebar">
        <div style="display:flex; justify-content:space-between;">
            <b>Explorer</b>
            <button onclick="newFile()" style="background:none;color:#22c55e;border:none;">+</button>
        </div>
        <div id="fileList"></div>
    </div>

    <!-- CENTER -->
    <div style="flex:1; display:flex; flex-direction:column;">
        <div id="topTabs"></div>
        <div id="editor"></div>
    </div>

    <!-- RIGHT -->
    <div id="right">
        <textarea id="input" placeholder="Enter input..."></textarea>
        <textarea id="output" placeholder="Output..." readonly></textarea>
    </div>

</div>

<script>
    let editor;
    let files = {};
    let currentFile = "";

    /* MONACO */
    require.config({
        paths: { vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs" }
    });

    require(["vs/editor/editor.main"], function () {
        editor = monaco.editor.create(document.getElementById("editor"), {
            value: "",
            language: "java",
            theme: "vs-dark"
        });

        createFile("Main.java", getTemplate("java"));
    });

    /* TEMPLATES */
    function getTemplate(lang) {
        switch (lang) {
            case "java":
                return `public class Main {
        public static void main(String[] args) {
            System.out.println("Hello Java");
        }
    }`;
            case "python":
                return `print("Hello Python")`;
            case "cpp":
                return `#include <iostream>
    using namespace std;
    int main(){
        cout << "Hello C++";
    }`;
            case "c":
                return `#include <stdio.h>
    int main(){
        printf("Hello C");
    }`;
            case "js":
                return `console.log("Hello JS");`;
        }
    }

    /* FILE SYSTEM */
    function createFile(name, content="") {
        files[name] = content;
        currentFile = name;
        editor.setValue(content);
        renderTabs();
        renderFileExplorer();
    }

    function switchFile(name) {
        files[currentFile] = editor.getValue();
        currentFile = name;
        editor.setValue(files[name]);
        renderTabs();
    }

    function deleteFile(name) {
        if (!confirm("Delete " + name + "?")) return;

        delete files[name];

        let remaining = Object.keys(files);

        if (remaining.length > 0) {
            switchFile(remaining[0]);
        } else {
            editor.setValue("");
            currentFile = "";
        }

        renderTabs();
        renderFileExplorer();
    }

    function newFile() {
        let name = prompt("Enter file name:");
        if (!name) return;
        createFile(name, "");
    }

    /* UI RENDER */
    function renderTabs() {
        const tabs = document.getElementById("topTabs");
        tabs.innerHTML = "";

        for (let file in files) {
            const tab = document.createElement("div");
            tab.className = "tab" + (file === currentFile ? " active" : "");
            tab.innerText = file;
            tab.onclick = () => switchFile(file);
            tabs.appendChild(tab);
        }
    }

    function renderFileExplorer() {
        const list = document.getElementById("fileList");
        list.innerHTML = "";

        for (let file in files) {
            const div = document.createElement("div");
            div.className = "file-item";

            div.innerHTML = `
                <span>${file}</span>
                <span class="delete-btn" onclick="deleteFile('${file}')">delete</span>
            `;

            div.onclick = () => switchFile(file);

            list.appendChild(div);
        }
    }

    /* LANGUAGE SWITCH */
    function changeLang() {
        let lang = document.getElementById("lang").value;

        const map = {
            java: "java",
            python: "python",
            cpp: "cpp",
            c: "c",
            js: "javascript"
        };

        const fileMap = {
            java: "Main.java",
            python: "main.py",
            cpp: "main.cpp",
            c: "main.c",
            js: "main.js"
        };

        const fileName = fileMap[lang];

        if (!files[fileName]) {
            createFile(fileName, getTemplate(lang));
        } else {
            switchFile(fileName);
        }

        monaco.editor.setModelLanguage(editor.getModel(), map[lang]);
    }

    /* RUN */
    async function runCode() {
        files[currentFile] = editor.getValue();

        document.getElementById("output").value = "Running...";

        try {
            const res = await fetch("/execute", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({
                    code: files[currentFile],
                    input: document.getElementById("input").value,
                    language: document.getElementById("lang").value
                })
            });

            const text = await res.text();
            document.getElementById("output").value = text;

        } catch {
            document.getElementById("output").value = "Backend not reachable";
        }
    }

    /* DOWNLOAD */
    function downloadCode() {
        const code = editor.getValue();
        const lang = document.getElementById("lang").value;

        const ext = {
            java: "java",
            python: "py",
            cpp: "cpp",
            c: "c",
            js: "js"
        };

        const blob = new Blob([code]);
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "code." + ext[lang];
        a.click();
    }

    /* SHARE */
    function shareCode() {
        const code = btoa(editor.getValue());
        const url = window.location.origin + "?code=" + code;
        prompt("Copy link:", url);
    }
</script>

</body>
</html>
